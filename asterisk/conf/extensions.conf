[avr]
exten => s,1,Answer()
 same => n,Ringing()
 same => n,Wait(1)
 same => n,Set(UUID=${SHELL(uuidgen | tr -d  \\n\')})
 same => n,Set(DENOISE(rx)=on)
 same => n,Dial(AudioSocket/${ARG1}/${UUID})
 same => n,Hangup()

[demo]
exten => 5001,1,GoSub(avr,s,1(avr-core:5001))
exten => 5002,1,GoSub(avr,s,1(host.docker.internal:5001))
exten => 5003,1,NoOp(Exten 5003 with http web service)
 same => n,Answer()
 same => n,Ringing()
 same => n,Wait(1)
 same => n,Set(UUID=${SHELL(uuidgen | tr -d  \\n\')})
 same => n,Set(JSON_BODY={"uuid":"${UUID}","payload":{"from":"${CALLERID(num)}","to":"${EXTEN}","uniqueid":"${UNIQUEID}","channel":"${CHANNEL}","recording": false}})
 same => n,Set(CURLOPT(httpheader)=Content-Type: application/json)
 same => n,Set(JSON_RESPONSE=${CURL(http://avr-core:6001/call,${JSON_BODY})})
 same => n,NoOp(JSON_BODY: ${JSON_BODY})
 same => n,NoOp(JSON_RESPONSE: ${JSON_RESPONSE})
 same => n,Set(DENOISE(rx)=on)
 same => n,Dial(AudioSocket/avr-core:5001/${UUID})
 same => n,Hangup()

; Outbound PSTN from extension 1000 (dial 9 + number)
exten => _9.,1,NoOp(Outbound PSTN call to ${EXTEN:1})
 same => n,Goto(outbound-pstn,${EXTEN:1},1)

[from-pstn]
; Inbound calls from IPHost trunk - route to AVR voice agent
; Handle calls without DID (extension 's')
exten => s,1,NoOp(---- Incoming PSTN call from ${CALLERID(num)} to DID s ----)
 same => n,NoOp(Routing to AVR voice agent)
 same => n,GoSub(avr,s,1(avr-core:5001))
 same => n,Hangup()

; Handle calls with specific DID
exten => _X.,1,NoOp(---- Incoming PSTN call from ${CALLERID(num)} to DID ${EXTEN} ----)
 same => n,NoOp(Routing to AVR voice agent)
 same => n,GoSub(avr,s,1(avr-core:5001))
 same => n,Hangup()

[outbound-pstn]
; Outbound calls to PSTN via IPHost trunk
; IPHost expects local Moldova format: 0XXXXXXXXX (e.g. 068155658)
exten => _X.,1,NoOp(---- Outbound call to ${EXTEN} ----)
 same => n,Set(CALLERID(num)=22011180)
 same => n,Set(CALLERID(name)=22011180)
 same => n,Set(RAW_NUMBER=${EXTEN})
 same => n,Set(FORMATTED_NUMBER=${RAW_NUMBER})
; Remove + prefix if present
 same => n,ExecIf($["${FORMATTED_NUMBER:0:1}" = "+"]?Set(FORMATTED_NUMBER=${FORMATTED_NUMBER:1}))
; Has 00373 prefix - strip 00373 to get 0XX...
 same => n,GotoIf($["${FORMATTED_NUMBER:0:5}" = "00373"]?strip-00373,1)
; Has 373 prefix - strip 373 to get local
 same => n,GotoIf($["${FORMATTED_NUMBER:0:3}" = "373"]?strip-373,1)
; Already local format (starts with 0) - dial as-is
 same => n,GotoIf($["${FORMATTED_NUMBER:0:1}" = "0"]?dial-out,1)
; No prefix - add leading 0
 same => n,Set(FORMATTED_NUMBER=0${FORMATTED_NUMBER})
 same => n,Goto(dial-out,1)
exten => strip-00373,1,Set(FORMATTED_NUMBER=0${FORMATTED_NUMBER:5})
 same => n,Goto(dial-out,1)
exten => strip-373,1,Set(FORMATTED_NUMBER=0${FORMATTED_NUMBER:3})
 same => n,Goto(dial-out,1)
exten => dial-out,1,NoOp(Dialing: ${FORMATTED_NUMBER})
 same => n,Dial(PJSIP/${FORMATTED_NUMBER}@iphost-endpoint,60,Ttm(default))
 same => n,NoOp(Dial status: ${DIALSTATUS})
 same => n,Hangup()
